<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .container {
        display: grid;
        gap: 10px;
        grid-template-columns: 300px auto minmax(200px, 300px);
        grid-template-rows: repeat(3, 100px);
        grid-auto-rows: 70px;
        }

        .item {
        background-color:#465f68;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
     
        } 

        /* .expands {} */

        /* .flexible {} */


    </style>
    <title>Grid Layout</title>
</head>

<body>

        <div class="item ">300px x 100px</div>
        <div class="item ">😎 ??? x 100px</div>
        <div class="item ">200px — 300px x 100px</div>
        <div class="item ">300px x 100px</div>

    </div>
</body>

</html>
